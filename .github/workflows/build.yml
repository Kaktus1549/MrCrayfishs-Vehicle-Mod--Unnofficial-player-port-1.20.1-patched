name: Build mod

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Gradle genIntellijRuns
        run: ./gradlew genIntellijRuns

      - name: Build
        run: ./gradlew build

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-mod-build
          path: build/libs/*.jar